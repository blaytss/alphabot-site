<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — AlphaBot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0e;--bg2:#0d1117;--bg3:#131920;
  --border:rgba(0,255,136,.12);--accent:#00ff88;--accent2:#00c96e;
  --text:#e8edf2;--muted:#4a5568;--muted2:#718096;--red:#ff3355;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0;}
.glow-left{position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,255,136,.06) 0%,transparent 70%);
  top:-100px;left:-200px;pointer-events:none;z-index:0;}
.glow-right{position:fixed;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,136,255,.04) 0%,transparent 70%);
  bottom:-100px;right:-100px;pointer-events:none;z-index:0;}

.container{position:relative;z-index:1;width:100%;max-width:440px;padding:24px;}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);
  border-radius:24px;padding:40px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);}

/* LOGO */
.logo{display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:32px;text-decoration:none;}
.logo-icon{width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;
  letter-spacing:2px;color:var(--accent);}

/* HEADER */
.card-header{text-align:center;margin-bottom:32px;}
.card-header h1{font-family:'Bebas Neue',sans-serif;font-size:36px;
  letter-spacing:2px;margin-bottom:8px;}
.card-header p{font-size:14px;color:var(--muted2);}
.card-header p a{color:var(--accent);text-decoration:none;}

/* FORM */
.form{display:flex;flex-direction:column;gap:18px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;font-weight:600;color:var(--muted2);
  text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;}
.form-input{background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;color:var(--text);padding:13px 16px;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  outline:none;transition:.2s;width:100%;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,.08);}
.form-input::placeholder{color:var(--muted);}
.form-input.error{border-color:var(--red);}

.input-wrap{position:relative;}
.input-wrap .form-input{padding-right:44px;}
.toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--muted2);font-size:16px;background:none;border:none;}

.forgot-link{text-align:right;margin-top:-8px;}
.forgot-link a{font-size:12px;color:var(--muted2);text-decoration:none;
  font-family:'DM Mono',monospace;}
.forgot-link a:hover{color:var(--accent);}

/* ERROR ALERT */
.alert-error{background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.2);
  border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);
  display:none;align-items:center;gap:8px;}
.alert-error.show{display:flex;}

/* SUBMIT */
.submit-btn{background:var(--accent);color:#000;padding:15px;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  border:none;transition:.2s;font-family:'DM Sans',sans-serif;
  width:100%;letter-spacing:.3px;}
.submit-btn:hover{background:var(--accent2);transform:translateY(-1px);}
.submit-btn.loading{opacity:.7;cursor:not-allowed;transform:none;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}

/* DISCORD LOGIN */
.discord-btn{width:100%;padding:13px;border-radius:10px;
  background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.2);
  color:#7289da;font-size:14px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;display:flex;align-items:center;
  justify-content:center;gap:10px;transition:.2s;}
.discord-btn:hover{background:rgba(88,101,242,.2);}

/* REMEMBER */
.remember-row{display:flex;align-items:center;justify-content:space-between;}
.remember-left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted2);}
.remember-check{width:16px;height:16px;border-radius:4px;
  border:1px solid var(--border);background:var(--bg3);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;transition:.2s;}
.remember-check.checked{background:var(--accent);border-color:var(--accent);color:#000;font-size:11px;}

/* FOOTER */
.card-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--muted2);}
.card-footer a{color:var(--muted2);text-decoration:none;}
.card-footer a:hover{color:var(--text);}

/* DEMO ACCOUNTS */
.demo-section{margin-top:20px;padding:16px;background:var(--bg3);
  border-radius:10px;border:1px solid var(--border);}
.demo-title{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.demo-accounts{display:flex;flex-direction:column;gap:6px;}
.demo-btn{background:transparent;border:1px solid var(--border);
  border-radius:6px;padding:8px 12px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);
  transition:.2s;}
.demo-btn:hover{border-color:var(--accent);color:var(--accent);}
.demo-plan{padding:2px 6px;border-radius:4px;font-size:10px;}
.demo-starter{background:rgba(255,255,255,.05);color:var(--muted2);}
.demo-pro{background:rgba(0,255,136,.1);color:var(--accent);}
.demo-elite{background:rgba(245,197,66,.1);color:#f5c542;}
</style>
</head>
<body>
<div class="glow-left"></div>
<div class="glow-right"></div>

<div class="container">
  <div class="card">

    <a href="index.html" class="logo">
      <div class="logo-icon">📈</div>
      <span class="logo-text">AlphaBot</span>
    </a>

    <div class="card-header">
      <h1>CONNEXION</h1>
      <p>Pas encore de compte ? <a href="inscription.html">S'inscrire →</a></p>
    </div>

    <div class="form" id="login-form">

      <div class="alert-error" id="alert-error">
        ⚠️ Email ou mot de passe incorrect
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="inp-email"
          placeholder="sacha@exemple.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="inp-pwd"
            placeholder="Ton mot de passe" autocomplete="current-password">
          <button class="toggle-pwd" type="button" onclick="togglePwd()">👁</button>
        </div>
      </div>

      <div class="remember-row">
        <div class="remember-left">
          <div class="remember-check" id="remember" onclick="toggleRemember()"></div>
          <span>Se souvenir de moi</span>
        </div>
        <div class="forgot-link"><a href="reset.html">Mot de passe oublié ?</a></div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitLogin()">
        Se connecter →
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OU</span>
        <div class="divider-line"></div>
      </div>

      <button class="discord-btn" onclick="loginDiscord()">
        🎮 Continuer avec Discord
      </button>

      <!-- DÉMO -->
      <div class="demo-section">
        <div class="demo-title">🧪 Comptes démo — test rapide</div>
        <div class="demo-accounts">
          <button class="demo-btn" onclick="fillDemo('starter@demo.com','demo1234')">
            <span>starter@demo.com</span>
            <span class="demo-plan demo-starter">Starter</span>
          </button>
          <button class="demo-btn" onclick="fillDemo('pro@demo.com','demo1234')">
            <span>pro@demo.com</span>
            <span class="demo-plan demo-pro">Pro ⭐</span>
          </button>
          <button class="demo-btn" onclick="fillDemo('elite@demo.com','demo1234')">
            <span>elite@demo.com</span>
            <span class="demo-plan demo-elite">Elite 👑</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <div class="card-footer">
    <a href="index.html">← Retour à l'accueil</a>
    &nbsp;·&nbsp;
    <a href="#">Mentions légales</a>
    &nbsp;·&nbsp;
    <a href="#">Support</a>
  </div>
</div>

<script>
const DEMO_ACCOUNTS = {
  'starter@demo.com': { pwd: 'demo1234', plan: 'starter', name: 'Demo Starter' },
  'pro@demo.com':     { pwd: 'demo1234', plan: 'pro',     name: 'Demo Pro' },
  'elite@demo.com':   { pwd: 'demo1234', plan: 'elite',   name: 'Demo Elite' },
};

function togglePwd() {
  const inp = document.getElementById('inp-pwd');
  const btn = document.querySelector('.toggle-pwd');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function toggleRemember() {
  const el = document.getElementById('remember');
  el.classList.toggle('checked');
  el.textContent = el.classList.contains('checked') ? '✓' : '';
}

function fillDemo(email, pwd) {
  document.getElementById('inp-email').value = email;
  document.getElementById('inp-pwd').value   = pwd;
  document.getElementById('alert-error').classList.remove('show');
}

function loginDiscord() {
  alert('Connexion Discord — à connecter avec OAuth2 Discord');
}

function submitLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const pwd   = document.getElementById('inp-pwd').value;
  const btn   = document.getElementById('submit-btn');
  const alert = document.getElementById('alert-error');

  if (!email || !pwd) {
    alert.classList.add('show');
    return;
  }

  btn.textContent = '⏳ Connexion...';
  btn.classList.add('loading');
  alert.classList.remove('show');

  setTimeout(() => {
    // Vérifie les comptes démo
    const account = DEMO_ACCOUNTS[email];
    if (account && account.pwd === pwd) {
      // Sauvegarde la session
      sessionStorage.setItem('alphabot_user', JSON.stringify({
        email: email,
        name:  account.name,
        plan:  account.plan
      }));
      window.location.href = 'dashboard-client.html';
    } else {
      btn.textContent = 'Se connecter →';
      btn.classList.remove('loading');
      alert.classList.add('show');
      document.getElementById('inp-email').classList.add('error');
      document.getElementById('inp-pwd').classList.add('error');
    }
  }, 1000);
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitLogin();
});
</script>
</body>
</html>
